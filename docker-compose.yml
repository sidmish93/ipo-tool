services:
  ipo-tool:
    build: .
    image: ipo-tool
    container_name: ipo-tool
    restart: always          # keeps it "always on" across reboots/crashes
    ports:
      - "80:8080"            # visit http://<server-ip>/
    environment:
      - PORT=8080
    # generation is memory-heavy (Chromium); cap it so it can't crash the VM
    mem_limit: 1500m
    shm_size: 512m
